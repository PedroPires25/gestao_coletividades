spring.application.name=gestao-clubes-api

# Desabilitar auto-configuração do DataSource (usamos ConexoBD manual com db.properties)
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

# Importa configurações locais se existirem (não vai para o Git)
spring.config.import=optional:classpath:application-local.properties

# Porta (Render define SERVER_PORT=10000 automaticamente via render.yaml)
server.port=${SERVER_PORT:8080}

# URL do Frontend (para gerar links em emails)
app.frontend.url=${FRONTEND_URL:http://localhost:5173}

# JWT
jwt.secret=${JWT_SECRET:uma_chave_muito_longa_e_aleatoria_com_mais_de_32_caracteres_123456}
jwt.expirationMillis=43200000

# Configurações de Email (Brevo)
brevo.api.key=${BREVO_API_KEY:}
brevo.sender.email=${BREVO_SENDER_EMAIL:plataforma.gcdc@gmail.com}
brevo.sender.name=Gestao de Coletividades

# Cloudinary (deixar vazio para usar armazenamento local)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Upload de ficheiros
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Notificações
notificacoes.email.ativo=true
notificacoes.sms.ativo=false

# Twilio (preencher quando notificacoes.sms.ativo=true)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}