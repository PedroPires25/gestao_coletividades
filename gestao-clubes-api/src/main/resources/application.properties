spring.application.name=gestao-clubes-api

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration,org.springframework.boot.autoconfigure.jdbc.DataSourceTransactionManagerAutoConfiguration

spring.config.import=optional:classpath:application-local.properties

server.port=${PORT:${SERVER_PORT:8080}}

app.frontend.url=${FRONTEND_URL:}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGINS:}

jwt.secret=${JWT_SECRET:}
jwt.expirationMillis=43200000

spring.mail.host=smtp-relay.brevo.com
spring.mail.port=587
spring.mail.username=${BREVO_USERNAME:}
spring.mail.password=${BREVO_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.enable=false
brevo.sender.email=${BREVO_SENDER_EMAIL:${BREVO_USERNAME:}}
brevo.sender.name=Gestão de Coletividades

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

notificacoes.email.ativo=${NOTIFICACOES_EMAIL_ATIVO:true}
notificacoes.sms.ativo=${NOTIFICACOES_SMS_ATIVO:false}

twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.from-number=${TWILIO_FROM_NUMBER:}