<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
    <!-- calendar body -->
    <rect x="8" y="14" width="48" height="42" rx="4" stroke="white" stroke-width="3"/>
    <!-- top bar -->
    <line x1="8" y1="26" x2="56" y2="26" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- pin left -->
    <line x1="21" y1="8" x2="21" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- pin right -->
    <line x1="43" y1="8" x2="43" y2="20" stroke="white" stroke-width="3" stroke-linecap="round"/>
    <!-- grid dots row 1 -->
    <circle cx="22" cy="36" r="2.5" fill="white"/>
    <circle cx="32" cy="36" r="2.5" fill="white"/>
    <circle cx="42" cy="36" r="2.5" fill="white"/>
    <!-- grid dots row 2 -->
    <circle cx="22" cy="46" r="2.5" fill="white"/>
    <circle cx="32" cy="46" r="2.5" fill="white"/>
    <circle cx="42" cy="46" r="2.5" fill="white"/>
</svg>
