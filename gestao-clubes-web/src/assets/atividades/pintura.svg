<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- canvas frame -->
  <rect x="8" y="8" width="34" height="28" rx="2" stroke="white" stroke-width="3"/>
  <!-- painting strokes on canvas -->
  <path d="M14 18L28 14" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M14 24L32 22" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <!-- paintbrush diagonal -->
  <path d="M36 30L54 12" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <!-- brush tip (bristles) -->
  <path d="M36 30L30 38L38 36Z" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- palette circles at bottom -->
  <circle cx="16" cy="48" r="4" stroke="white" stroke-width="2.5"/>
  <circle cx="28" cy="50" r="4" stroke="white" stroke-width="2.5"/>
  <circle cx="40" cy="48" r="4" stroke="white" stroke-width="2.5"/>
</svg>
